<script>
// ============================================
// VARIABLES GLOBALES
// ============================================
let operacionesData = { activas: [], completadas: [] };

// Lista de CEX disponibles
const CEX_LIST = ['Binance', 'Bybit', 'OKX', 'Bitget'];

document.addEventListener('DOMContentLoaded', function() {
  console.log('DOM cargado, inicializando...');

  setFechaHoraActual();
  cargarCEXSelect();

  document.getElementById('formOperacion').addEventListener('submit', guardarOperacion);

  document.getElementById('modalDetalle').addEventListener('click', function(e) {
    if (e.target === this) cerrarModal();
  });

  // Pequeño retardo para que google.script.run esté disponible
  setTimeout(function() {
    cargarOperaciones();
    cargarResumen();
  }, 100);

  // Delegación de eventos para tablas
  const setupDelegation = (id) => {
    const container = document.getElementById(id);
    if (!container) return;
    container.addEventListener('click', function(e) {
      const target = e.target;
      const row = target.closest('.operacion-row');
      if (!row) return;

      const fila = parseInt(row.dataset.fila || '0');
      const isHist = row.dataset.historial === 'true';

      if (target.closest('.editable')) return;

      const btn = target.closest('.btn-icon');
      if (btn) {
        e.stopPropagation();
        if (btn.classList.contains('btn-edit')) cargarEdicionOperacion(fila);
        if (btn.classList.contains('btn-delete')) eliminarOperacionUI(fila);
        return;
      }

      if (target.closest('select') || target.closest('input')) { e.stopPropagation(); return; }

      mostrarDetalle(fila, isHist);
    });
  };

  setupDelegation('activasContainer');
  setupDelegation('historialContainer');
});

// ============================================
// CONFIGURACIÓN
// ============================================
function setFechaHoraActual() {
  try {
    const ahora = new Date();
    ahora.setMinutes(0, 0, 0);
    // Ajuste de zona horaria para el input datetime-local
    const offset = ahora.getTimezoneOffset() * 60000;
    const local = new Date(ahora.getTime() - offset);
    const input = document.getElementById('fechaInicio');
    if (input) input.value = local.toISOString().slice(0, 16);
  } catch (e) {
    console.error('Error al establecer fecha:', e);
  }
}

function cargarCEXSelect() {
  try {
    const select = document.getElementById('cex');
    if (!select) return;
    select.innerHTML = '<option value="">Seleccionar CEX...</option>';
    CEX_LIST.forEach(cex => {
      const option = document.createElement('option');
      option.value = cex;
      option.textContent = cex;
      select.appendChild(option);
    });
  } catch (e) {
    console.error('Error al cargar CEX:', e);
  }
}

// ============================================
// GUARDAR OPERACIÓN
// ============================================
function guardarOperacion(e) {
  e.preventDefault();
  console.log('Guardando operación...');

  showLoading('formLoading', true);

  try {
    const fechaInput = document.getElementById('fechaInicio').value;
    if (!fechaInput) {
      showAlert('error', 'Debes seleccionar una fecha de inicio');
      showLoading('formLoading', false);
      return;
    }

    const [datePart, timePart] = fechaInput.split('T');
    const hour = timePart.split(':')[0];
    const fechaLocalExacta = datePart + 'T' + hour + ':00';

    const cex = document.getElementById('cex').value;
    const monto = parseFloat(document.getElementById('monto').value);
    const moneda = document.getElementById('moneda').value;
    const apr = parseFloat(document.getElementById('apr').value);
    const tipoOperacion = document.getElementById('tipoOperacion').value;
    const precioObjetivo = parseFloat(document.getElementById('precioObjetivo').value);

    if (!cex)                                         { showAlert('error', 'Selecciona un CEX');               showLoading('formLoading', false); return; }
    if (!monto || isNaN(monto) || monto <= 0)         { showAlert('error', 'Ingresa un monto válido');         showLoading('formLoading', false); return; }
    if (!moneda)                                      { showAlert('error', 'Selecciona una moneda');           showLoading('formLoading', false); return; }
    if (!apr || isNaN(apr) || apr <= 0)               { showAlert('error', 'Ingresa un APR válido');           showLoading('formLoading', false); return; }
    if (!tipoOperacion)                               { showAlert('error', 'Selecciona un tipo de operación'); showLoading('formLoading', false); return; }
    if (!precioObjetivo || isNaN(precioObjetivo) || precioObjetivo <= 0) { showAlert('error', 'Ingresa un precio objetivo válido'); showLoading('formLoading', false); return; }

    const datos = {
      fechaInicio: fechaLocalExacta,
      cex, monto, moneda, apr, tipoOperacion, precioObjetivo
    };

    console.log('Datos a enviar:', datos);

    if (!isGASAvailable()) {
      showAlert('error', 'No se pudo conectar con Google Apps Script');
      showLoading('formLoading', false);
      return;
    }

    const successHandler = function(response) {
      showLoading('formLoading', false);
      console.log('Respuesta servidor:', response);
      if (response && response.success) {
        showAlert('success', window.editandoFila ? 'Operación actualizada correctamente' : 'Operación guardada correctamente');
        document.getElementById('formOperacion').reset();
        
        if (window.editandoFila) {
           const submitBtn = document.querySelector('#formOperacion button[type="submit"]');
           submitBtn.textContent = 'Agregar Operación';
           submitBtn.classList.remove('btn-warning');
           
           const btnCancel = document.getElementById('btnCancelar');
           if (btnCancel) btnCancel.style.display = 'none';
           
           window.editandoFila = null;
        }
        
        setFechaHoraActual();
        cargarOperaciones(true); 
        cargarResumen();
      } else {
        showAlert('error', extraerMensaje(response, 'Error en el servidor'));
      }
    };

    const failureHandler = function(error) {
      showLoading('formLoading', false);
      console.error('Error de servidor:', error);
      showAlert('error', 'Error: ' + extraerMensaje(error, 'Error desconocido'));
    };

    if (window.editandoFila) {
      datos.fila = window.editandoFila;
      google.script.run
        .withSuccessHandler(successHandler)
        .withFailureHandler(failureHandler)
        .actualizarOperacionFila(datos);
    } else {
      google.script.run
        .withSuccessHandler(successHandler)
        .withFailureHandler(failureHandler)
        .agregarOperacion(datos);
    }

  } catch (error) {
    console.error('Error en guardarOperacion:', error);
    showLoading('formLoading', false);
    showAlert('error', 'Error: ' + (error.message || 'Error desconocido'));
  }
}

// ============================================
// CARGAR OPERACIONES
// ============================================
function cargarOperaciones(silencioso = false) {
  const activasCont = document.getElementById('activasContainer');
  const historialCont = document.getElementById('historialContainer');

  if (!silencioso) {
    const skeletonTable = (cols) => `
      <div class="table-container">
        <table>
          <tbody>
            ${Array(4).fill(`
              <tr>
                <td colspan="${cols}"><div class="skeleton skeleton-text" style="height:45px; margin:5px 0; border-radius:8px;"></div></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;
    if (activasCont) activasCont.innerHTML = skeletonTable(9);
    if (historialCont) historialCont.innerHTML = skeletonTable(12);
  }

  if (!isGASAvailable()) {
    mostrarErrorCarga('No se pudo conectar con Google Apps Script.');
    return;
  }

  google.script.run
    .withSuccessHandler(function(response) {
      if (response && response.success) {
        operacionesData = response;
        renderizarActivas(response.activas || []);
        renderizarHistorial(response.completadas || []);
      } else {
        mostrarErrorCarga(extraerMensaje(response, 'Error al cargar operaciones'));
      }
    })
    .withFailureHandler(function(error) {
      mostrarErrorCarga(extraerMensaje(error, 'Error al conectar con el servidor'));
    })
    .obtenerOperaciones();
}

function mostrarErrorCarga(mensaje) {
  const activasContainer   = document.getElementById('activasContainer');
  const historialContainer = document.getElementById('historialContainer');

  const errorHtml = `
    <div class="error-state">
      <span class="error-state-icon">⚠️</span>
      <h3>Error al cargar</h3>
      <p>${sanitize(mensaje)}</p>
      <button onclick="cargarOperaciones()" class="btn btn-primary" style="margin-top:4px;">
        🔄 Reintentar
      </button>
    </div>
  `;

  if (activasContainer)   activasContainer.innerHTML   = errorHtml;
  if (historialContainer) historialContainer.innerHTML = errorHtml;
}

// ============================================
// RENDERIZAR TABLAS
// ============================================
function renderizarActivas(activas) {
  const container = document.getElementById('activasContainer');
  if (!container) return;

  actualizarContador('countActivas', activas.length);

  if (!activas || activas.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <span class="empty-state-icon">🛰️</span>
        <h3>No hay operaciones activas</h3>
        <p>Completa el formulario para iniciar una nueva inversión</p>
      </div>
    `;
    return;
  }

  let html = `
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Fecha Inicio</th>
            <th>CEX</th>
            <th>Monto</th>
            <th>Moneda</th>
            <th>% APR</th>
            <th>Tipo operación</th>
            <th>Precio Obj.</th>
            <th>Interés</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
  `;

  activas.forEach(op => {
    const fechaInicio     = formatearFecha(op.fechaInicio);
    const montoFormateado = formatearMonto(op.monto, op.moneda);
    const badgeClass      = getBadgeClass(op.tipoOperacion);
    const moneda          = op.moneda ? String(op.moneda) : 'USDT';
    const monedaKey       = moneda.toLowerCase().replace(/[^a-z]/g, '');
    const interesStr      = formatearInteres(op.interes, moneda);
    
    // Formatear duración: si M > 0 usa dias, si no usa horas de O
    const m = Math.round(parseFloat(String(op.tiempoCex || '0').replace(/[^\d.-]/g, '')) || 0);
    const o = Math.round(parseFloat(String(op.duracion  || '0').replace(/[^\d.-]/g, '')) || 0);
    
    let duracionLimpia = '';
    if (m > 0) {
      duracionLimpia = m + ' día';
    } else if (o > 0) {
      duracionLimpia = o + ' horas';
    }
    const duracionBadge   = duracionLimpia ? `<div class="badge-duration">${duracionLimpia}</div>` : '';

    html += `
      <tr class="operacion-row" data-fila="${op.fila}" data-historial="false">
        <td class="td-nowrap">
          <div style="margin-bottom:2px;">${fechaInicio}</div>
          ${duracionBadge}
        </td>
        <td><strong>${op.cex || '-'}</strong></td>
        <td class="td-nowrap">${montoFormateado}</td>
        <td><span class="badge badge-${monedaKey}">${moneda}</span></td>
        <td><strong>${op.apr}%</strong></td>
        <td class="td-nowrap">
          <span class="badge ${badgeClass}">${op.tipoOperacion || '-'}</span>
        </td>
        <td>$${formatearNumero(op.precioObjetivo)}</td>
        <td class="success"><strong>${interesStr}</strong></td>
        <td class="td-nowrap">
          <select class="select-moneda-final" onchange="completarOperacion(${op.fila}, this.value, this)" style="margin-bottom:6px; display:block;">
            <option value="">Final...</option>
            <option value="USDT">USDT</option>
            <option value="ETH">ETH</option>
            <option value="BTC">BTC</option>
          </select>
          <div style="display:flex; gap:8px;">
            <button class="btn-icon btn-edit" title="Editar">
              <svg style="pointer-events:none;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            </button>
            <button class="btn-icon btn-icon-danger btn-delete" title="Eliminar">
              <svg style="pointer-events:none;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
            </button>
          </div>
        </td>
      </tr>
    `;
  });

  html += '</tbody></table></div>';
  container.innerHTML = html;
}

function renderizarHistorial(completadas) {
  const container = document.getElementById('historialContainer');
  if (!container) return;

  actualizarContador('countHistorial', completadas.length);

  if (!completadas || completadas.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <span class="empty-state-icon">📃</span>
        <h3>No hay operaciones completadas</h3>
        <p>Las operaciones finalizadas aparecerán aquí</p>
      </div>
    `;
    return;
  }

  // Mostrar del último al primero
  const ordenadas = [...completadas].reverse();

  let html = `
    <div class="table-container historial-table-container">
      <table>
        <thead>
          <tr>
            <th>Fecha Inicio</th>
            <th>CEX</th>
            <th>Monto</th>
            <th>Moneda</th>
            <th>% APR</th>
            <th>Tipo op.</th>
            <th>Precio Obj.</th>
            <th>Interés</th>
            <th>Total calc.</th>
            <th>Final Obtenido</th>
            <th>APR Acum.</th>
            <th>APR Ef. Diario</th>
          </tr>
        </thead>
        <tbody>
  `;

  ordenadas.forEach(op => {
    const fechaInicio     = formatearFecha(op.fechaInicio);
    const montoFormateado = formatearMonto(op.monto, op.moneda);
    const badgeClass      = getBadgeClass(op.tipoOperacion);
    const moneda          = op.moneda      ? String(op.moneda)      : 'USDT';
    const monedaFinal     = op.monedaFinal ? String(op.monedaFinal) : '-';
    const monedaKey       = moneda.toLowerCase().replace(/[^a-z]/g, '');
    const monedaFinalKey  = monedaFinal.toLowerCase().replace(/[^a-z]/g, '');
    const interesStr      = formatearInteres(op.interes, moneda);
    
    // Total: siempre USDT 2 decimales
    const totalStr        = op.total !== null && op.total !== undefined && op.total !== '' && !isNaN(Number(op.total))
      ? '$' + parseFloat(op.total).toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
      : '-';
    const finalStr        = formatearFinal(op.final, (monedaFinal !== '-' ? monedaFinal : moneda));

    // Formatear duración: si M > 0 usa dias, si no usa horas de O
    const m_h = Math.round(parseFloat(String(op.tiempoCex || '0').replace(/[^\d.-]/g, '')) || 0);
    const o_h = Math.round(parseFloat(String(op.duracion  || '0').replace(/[^\d.-]/g, '')) || 0);
    
    let duracionLimpia = '';
    if (m_h > 0) {
      duracionLimpia = m_h + ' día';
    } else if (o_h > 0) {
      duracionLimpia = o_h + ' horas';
    }
    const duracionBadge   = duracionLimpia ? `<div class="badge-duration">${duracionLimpia}</div>` : '';

    html += `
      <tr class="operacion-row" data-fila="${op.fila}" data-historial="true">
        <td class="td-nowrap">
          <div style="margin-bottom:2px;">${fechaInicio}</div>
          ${duracionBadge}
        </td>
        <td><strong>${op.cex || '-'}</strong></td>
        <td class="td-nowrap">${montoFormateado}</td>
        <td><span class="badge badge-${monedaKey}">${moneda}</span></td>
        <td><strong>${op.apr}%</strong></td>
        <td class="td-nowrap">
          <span class="badge ${badgeClass}">${op.tipoOperacion || '-'}</span>
        </td>
        <td>$${formatearNumero(op.precioObjetivo)}</td>
        <td class="success"><strong>${interesStr}</strong></td>
        <td class="highlight"><strong>${totalStr}</strong></td>
        <td>${finalStr}</td>
        <td>${op.aprAcum}%</td>
        <td>${op.aprEfectivo}%</td>
      </tr>
    `;
  });

  html += '</tbody></table></div>';
  container.innerHTML = html;
}

function completarOperacion(fila, monedaFinal, selectElement) {
  if (!monedaFinal) return;

  mostrarConfirmacion(`¿Confirmar que la operación finalizó en ${monedaFinal}?`, function() {
    if (!isGASAvailable()) {
      showAlert('error', 'No se pudo conectar con Google Apps Script');
      selectElement.value = '';
      return;
    }

    google.script.run
      .withSuccessHandler(function(response) {
        if (response && response.success) {
          showAlert('success', 'Operación completada correctamente');
          cargarOperaciones(true);
        } else {
          showAlert('error', extraerMensaje(response, 'Error al completar'));
          selectElement.value = '';
        }
      })
      .withFailureHandler(function(error) {
        showAlert('error', 'Error: ' + extraerMensaje(error, 'Error desconocido'));
        selectElement.value = '';
      })
      .completarOperacion(fila, monedaFinal);
  }, function() {
    selectElement.value = '';
  });
}

function eliminarOperacionUI(fila) {
  if (!confirm('¿Estás seguro de que deseas eliminar esta operación de forma permanente?')) return;
  
  if (!isGASAvailable()) { showAlert('error', 'No hay conexión'); return; }
  
  // Borrado optimista local para feedback instantáneo
  const opRow = document.querySelector(`.operacion-row[onclick="mostrarDetalle(${fila}, false)"]`);
  if (opRow) {
    opRow.style.opacity = '0.5';
    opRow.style.pointerEvents = 'none';
  }

  google.script.run
    .withSuccessHandler(function(response) {
      if (response && response.success) {
        showAlert('success', 'Operación eliminada');
        cargarOperaciones(true);
      } else {
        if (opRow) { opRow.style.opacity = '1'; opRow.style.pointerEvents = 'auto'; }
        showAlert('error', extraerMensaje(response, 'Error al eliminar'));
      }
    })
    .withFailureHandler(function(error) {
      if (opRow) { opRow.style.opacity = '1'; opRow.style.pointerEvents = 'auto'; }
      showAlert('error', extraerMensaje(error, 'Error de conexión'));
    })
    .eliminarOperacionFila(fila);
}

function cargarEdicionOperacion(fila) {
  const op = (operacionesData.activas || []).find(o => o.fila === fila) || (operacionesData.completadas || []).find(o => o.fila === fila);
  if (!op) return;
  
  if (op.fechaInicio) {
    // El servidor envía "yyyy-MM-dd HH:mm:ss". datetime-local requiere "yyyy-MM-ddTHH:mm"
    const rawLocal = op.fechaInicio.replace(' ', 'T').substring(0, 16);
    document.getElementById('fechaInicio').value = rawLocal;
  }
  
  document.getElementById('cex').value = op.cex || '';
  document.getElementById('monto').value = op.monto || '';
  document.getElementById('moneda').value = op.moneda || '';
  
  document.getElementById('apr').value = op.apr || ''; 
  document.getElementById('tipoOperacion').value = op.tipoOperacion || '';
  document.getElementById('precioObjetivo').value = op.precioObjetivo || '';
  
  window.editandoFila = fila;
  
  const submitBtn = document.querySelector('#formOperacion button[type="submit"]');
  if (submitBtn) {
    submitBtn.textContent = 'Actualizar Operación';
    submitBtn.classList.add('btn-warning');
  }
  showAlert('info', '✏️ Modo edición activado. Modifica los campos y pulsa "Actualizar".', 5000);
  
  const btnCancel = document.getElementById('btnCancelar');
  if (btnCancel) btnCancel.style.display = 'inline-block';
  
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function cancelarEdicion() {
  window.editandoFila = null;
  document.getElementById('formOperacion').reset();
  setFechaHoraActual();
  
  const submitBtn = document.querySelector('#formOperacion button[type="submit"]');
  if (submitBtn) {
    submitBtn.textContent = 'Guardar Operación';
    submitBtn.classList.remove('btn-warning');
  }
  
  const btnCancel = document.getElementById('btnCancelar');
  if (btnCancel) btnCancel.style.display = 'none';
  
  // Ocultar alerta de info
  const alertInfo = document.getElementById('alertInfo');
  if (alertInfo) alertInfo.classList.remove('show');
}

// ============================================
// MODAL
// ============================================
function mostrarDetalle(fila, esHistorial) {
  const operaciones = esHistorial ? operacionesData.completadas : operacionesData.activas;
  if (!operaciones) return;

  const op = operaciones.find(o => o.fila === fila);
  if (!op) return;

  const badgeClass  = getBadgeClass(op.tipoOperacion);
  const fechaInicio = formatearFecha(op.fechaInicio);
  const fechaFin    = op.fechaFin ? formatearFecha(op.fechaFin) : '-';
  const moneda      = op.moneda || 'USDT';
  const monedaFinal = op.monedaFinal || '-';

  // Asegurar que moneda y monedaFinal siempre sean strings
  const monedaKey      = moneda.toLowerCase().replace(/[^a-z]/g, '');
  const monedaFinalKey = monedaFinal.toLowerCase().replace(/[^a-z]/g, '');

  let html = `
    <div class="detail-item">
      <div class="detail-label">Fecha de Inicio</div>
      <div class="detail-value">${fechaInicio}</div>
    </div>
    ${esHistorial ? `
    <div class="detail-item">
      <div class="detail-label">Fecha de Fin</div>
      <div class="detail-value">${fechaFin}</div>
    </div>
    ` : ''}
    <div class="detail-item">
      <div class="detail-label">CEX</div>
      <div class="detail-value highlight">${op.cex || '-'}</div>
    </div>
    <div class="detail-item">
      <div class="detail-label">Monto Inicial</div>
      <div class="detail-value" style="display:flex; align-items:center; gap:8px;">
        ${formatearMonto(op.monto, op.moneda)} <span class="badge badge-${monedaKey}">${moneda}</span>
      </div>
    </div>
    <div class="detail-item">
      <div class="detail-label">% APR</div>
      <div class="detail-value highlight">${op.apr}%</div>
    </div>
    <div class="detail-item">
      <div class="detail-label">Tipo de Operación</div>
      <div class="detail-value"><span class="badge ${badgeClass}">${op.tipoOperacion || '-'}</span></div>
    </div>
    ${!esHistorial ? (() => {
      const interesStr = formatearInteres(op.interes, moneda);
      const totalStr = op.total !== null && op.total !== undefined && op.total !== '' && !isNaN(Number(op.total))
        ? '$' + parseFloat(op.total).toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
        : '-';
      return `
      <div class="detail-item">
        <div class="detail-label">Interés a Ganar</div>
        <div class="detail-value success">${interesStr}</div>
      </div>
      <div class="detail-item">
        <div class="detail-label">Total Calculado</div>
        <div class="detail-value highlight">${totalStr}</div>
      </div>
      `;
    })() : ''}
    <div class="detail-item">
      <div class="detail-label">Precio Objetivo</div>
      <div class="detail-value">$${formatearNumero(op.precioObjetivo)}</div>
    </div>
  `;

  if (esHistorial) {
    const monedaFinalKey = monedaFinal.toLowerCase().replace(/[^a-z]/g, '');
    const interesStr = formatearInteres(op.interes, moneda);
    const totalStr = op.total !== null && op.total !== undefined && op.total !== '' && !isNaN(Number(op.total))
      ? '$' + parseFloat(op.total).toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
      : '-';
    const finalStr = formatearFinal(op.final, monedaFinal !== '-' ? monedaFinal : moneda);
    html += `
      <div class="detail-item">
        <div class="detail-label">Interés Generado</div>
        <div class="detail-value success">${interesStr}</div>
      </div>
      <div class="detail-item">

        <div class="detail-value success">${totalStr}</div>

      <div class="detail-item">

        <div class="detail-value highlight" style="display:flex; align-items:center; gap:8px;">
          ${finalStr} <span class="badge badge-${monedaFinalKey}">${monedaFinal}</span>
        </div>

        <div class="detail-value highlight">${op.aprAcum}%</div>

        <div class="detail-label">APR Efectivo Diario (W)</div>
        <div class="detail-value highlight">${op.aprEfectivo}%</div>
      </div>
    `;
  }

  const detalleContent = document.getElementById('detalleContent');

  if (modalDetalle)   modalDetalle.classList.add('active');

function cargarResumen(isSilent) {
  const container = document.getElementById('resumenContainer');
  if (container && !isSilent) {
    container.innerHTML = `
      <div class="card skeleton-card" style="grid-column: 1/-1; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.02);">
        <div class="skeleton" style="width: 80%; height: 20px; margin-bottom: 20px;"></div>
        <div class="skeleton" style="width: 60%; height: 30px;"></div>
      </div>
      <div class="card skeleton-card" style="display: flex; flex-direction: column; gap: 15px;">
        <div class="skeleton" style="width: 100%; height: 40px;"></div>
        <div class="skeleton" style="width: 80%; height: 20px;"></div>
      </div>
      <div class="card skeleton-card" style="display: flex; flex-direction: column; gap: 15px;">
        <div class="skeleton" style="width: 100%; height: 40px;"></div>
        <div class="skeleton" style="width: 80%; height: 20px;"></div>
      </div>
    `;
  }

  if (!isGASAvailable()) {
    console.error('google.script.run no está disponible para resumen');
    mostrarErrorResumen('No se pudo conectar con Google Apps Script');
    return;
  }

  google.script.run
    .withSuccessHandler(function(response) {
      console.log('Resumen recibido:', response);
      if (response && response.success) {
        renderizarResumen(response);
      } else {
        mostrarErrorResumen(extraerMensaje(response, 'Error al cargar resumen'));
      }
    })
    .withFailureHandler(function(error) {
      console.error('Error withFailureHandler cargarResumen:', error);
      mostrarErrorResumen(extraerMensaje(error, 'Error al conectar con el servidor'));
    })
    .obtenerResumen();
}

function mostrarErrorResumen(mensaje) {
  const container = document.getElementById('resumenContainer');
  if (container) {
    container.innerHTML = `
      <div class="error-state" style="grid-column:1/-1;">
        <span class="error-state-icon">📊</span>
        <h3>⚠️ Error al cargar resumen</h3>
        <p>${sanitize(mensaje)}</p>
        <button onclick="cargarResumen()" class="btn btn-primary" style="margin-top:4px;">
          🔄 Reintentar
        </button>
      </div>
    `;
  }
}

function renderizarResumen(data) {
  const container = document.getElementById('resumenContainer');
  if (!container) return;

  // Los valores de getDisplayValues() ya vienen formateados por la hoja:
  // fechas como "26/02/2026", porcentajes como "15.22%", moneda como "$17,942.84"
  // Solo necesitamos mostrarlos tal como llegan.
  function buildCard(titulo, filas, opts) {
    opts = opts || {};
    let card = '<div class="resumen-card"><h3>' + titulo + '</h3>';
    filas.forEach(function(row, index) {
      // row[0] = etiqueta, row[1] = valor (ambos strings de getDisplayValues)
      const etiqueta = row[0] ? String(row[0]).trim() : '';
      if (!etiqueta) return;
      const valor = row[1] !== null && row[1] !== '' ? String(row[1]).trim() : '-';
      const isEditable   = opts.editableRows && opts.editableRows.includes(index);
      const isHighlight  = opts.highlightFn ? opts.highlightFn(etiqueta, valor) : false;
      const isSuccess    = opts.successFn   ? opts.successFn(etiqueta, valor)   : false;
      
      let note = '';
      let celdaRef = '';
      let formula = '';
      if (isEditable) {
        celdaRef = (index === 1) ? 'B4' : 'B6';
        let rawNote = (index === 1) ? data.notaB4 : data.notaB6;
        formula = (index === 1) ? data.formulaB4 : data.formulaB6;
        if (rawNote) {
          note = rawNote.trim().replace(/\. (?=[0-9])/g, '\n').replace(/\.$/, '');
        }
      }
      const cls = isEditable ? 'editable' : (isSuccess ? 'success' : (isHighlight ? 'highlight' : ''));
      card += `
        <div class="resumen-item">
          <span class="resumen-label">${sanitize(etiqueta)}</span>
          <span class="resumen-value ${cls}"
                ${isEditable && note ? `data-note="${sanitize(note)}"` : ''}
                ${isEditable && formula ? `data-formula="${sanitize(formula)}"` : ''}
                ${isEditable ? `onclick="editarCelda(this, '${celdaRef}', '${sanitize(etiqueta)}')"` : ''}>
            ${sanitize(valor)}
          </span>
        </div>`;
    });
    card += '</div>';
    return card;
  }

  let html = '';

  // Cuadro 1 (A3:B11) — Resumen BBVA
  if (data.cuadro1 && data.cuadro1.length > 0) {
    html += buildCard('📊 Resumen BBVA', data.cuadro1, {
      editableRows: [1, 3]  // B4 (Cantidad) y B6 (Monto cuota)
    });
  }

  // Cuadro 2 (E2:F5) — Objetivos
  if (data.cuadro2 && data.cuadro2.length > 0) {
    html += buildCard('🎯 Objetivos', data.cuadro2, {
      highlightFn: function(label) {
        return label.toLowerCase().includes('min') || label.toLowerCase().includes('mín');
      }
    });
  }

  // Cuadro 3 (E7:F12) — Resultados con calculadora interactiva
  if (data.cuadro3 && data.cuadro3.length > 0) {
    const rows = data.cuadro3;
    // Extraer valores: Capital Inicial (E7), NET PROFIT (E8), %APR (E9), Días (E10), Retiro mensual (E11), Capital Final (E12)
    function parseNum(str) {
      if (!str || str === '-') return 0;
      return parseFloat(String(str).replace(/[$,%\s]/g, '').replace(',', '.')) || 0;
    }
    const capitalInicial = parseNum(rows[0] ? rows[0][1] : '0');
    const netProfit      = parseNum(rows[1] ? rows[1][1] : '0');
    const aprVal         = parseNum(rows[2] ? rows[2][1] : '0');
    const diasVal        = parseNum(rows[3] ? rows[3][1] : '0');
    const retiroVal      = parseNum(rows[4] ? rows[4][1] : '0');
    const capitalFinal   = parseNum(rows[5] ? rows[5][1] : '0');

    const netProfitStr = rows[1] ? String(rows[1][1]).trim() : '-';
    const capInicStr   = rows[0] ? String(rows[0][1]).trim() : '-';

    html += `
    <div class="resumen-card resumen-calc-card">
      <h3>💰 Resultados</h3>
      <div class="resumen-item">
        <span class="resumen-label">${rows[0] ? sanitize(String(rows[0][0])) : 'Capital Inicial'}</span>
        <span class="resumen-value">${sanitize(capInicStr)}</span>
      </div>
      <div class="resumen-item">
        <span class="resumen-label">${rows[1] ? sanitize(String(rows[1][0])) : 'NET PROFIT'}</span>
        <span class="resumen-value success">${sanitize(netProfitStr)}</span>
      </div>
      <div class="resumen-item calc-editable-item">
        <span class="resumen-label">${rows[2] ? sanitize(String(rows[2][0])) : '%APR'}</span>
        <div class="calc-input-wrap">
          <input type="number" id="calcApr" class="calc-input" value="${aprVal}" step="1" min="0" max="1000" />
          <span class="calc-unit">%</span>
        </div>
      </div>
      <div class="resumen-item calc-editable-item">
        <span class="resumen-label">${rows[3] ? sanitize(String(rows[3][0])) : 'Días'}</span>
        <div class="calc-input-wrap">
          <input type="number" id="calcDias" class="calc-input" value="${diasVal}" step="1" min="1" />
          <span class="calc-unit">días</span>
        </div>
      </div>
      <div class="resumen-item calc-editable-item">
        <span class="resumen-label">${rows[4] ? sanitize(String(rows[4][0])) : 'Retiro mensual'}</span>
        <div class="calc-input-wrap">
          <span class="calc-unit">$</span>
          <input type="number" id="calcRetiro" class="calc-input" value="${retiroVal}" step="1" min="0" />
        </div>
      </div>
      <div class="resumen-item calc-result-item">
        <span class="resumen-label">${rows[5] ? sanitize(String(rows[5][0])) : 'Capital Final'}</span>
        <span class="resumen-value highlight calc-result" id="calcCapitalFinal">
          $${capitalFinal.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
        </span>
      </div>
      <div class="calc-note">✏️ Edita APR, días o retiro para simular tu capital final</div>
    </div>
    `;
  }

  container.innerHTML = html || '<div class="resumen-card" style="grid-column:1/-1;"><p style="color:var(--gray);">No hay datos de resumen disponibles</p></div>';

  // Adjuntar calculadora en tiempo real
  setTimeout(function() {
    const calcApr    = document.getElementById('calcApr');
    const calcDias   = document.getElementById('calcDias');
    const calcRetiro = document.getElementById('calcRetiro');
    const calcResult = document.getElementById('calcCapitalFinal');
    if (!calcApr || !calcDias || !calcRetiro || !calcResult) return;

    // Leer capital inicial del primer cuadro3 row
    const rows = data.cuadro3 || [];
    function parseNum(s) {
      if (!s || s === '-') return 0;
      return parseFloat(String(s).replace(/[$,%\s]/g, '').replace(',','.')) || 0;
    }
    const ci = parseNum(rows[0] ? rows[0][1] : '0');

    function recalcular() {
      const aprPct  = parseFloat(calcApr.value)   || 0;
      const dias    = parseFloat(calcDias.value)   || 0;
      const retiro  = parseFloat(calcRetiro.value) || 0;

      // Fórmula exacta de Google Sheets:
      // =(CI*(1+r/365)^(INT(d/30)*30) - retiro*((1+r/365)^(INT(d/30)*30)-1)/((1+r/365)^30-1))*(1+r/365)^RESIDUO(d,30)
      const r         = aprPct / 100;               // APR como decimal
      const rDay      = r / 365;                    // tasa diaria
      const mesesInt  = Math.floor(dias / 30);      // meses completos enteros
      const diasC     = mesesInt * 30;              // días de meses completos
      const diasR     = dias % 30;                  // días residuales (RESIDUO)
      const factorC   = Math.pow(1 + rDay, diasC);  // (1+r/365)^(INT(d/30)*30)
      const factor30  = Math.pow(1 + rDay, 30);     // (1+r/365)^30
      const factorR   = Math.pow(1 + rDay, diasR);  // (1+r/365)^RESIDUO(d,30)

      let capital;
      if (retiro === 0 || Math.abs(factor30 - 1) < 1e-12) {
        // Sin retiro o tasa cero: crecimiento simple
        capital = ci * factorC * factorR;
      } else {
        capital = (ci * factorC - retiro * (factorC - 1) / (factor30 - 1)) * factorR;
      }

      capital = Math.max(0, capital);
      calcResult.textContent = '$' + capital.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      calcResult.classList.toggle('calc-positive', capital >= ci);
      calcResult.classList.toggle('calc-negative', capital < ci);
    }

    calcApr.addEventListener('input',    recalcular);
    calcDias.addEventListener('input',   recalcular);
    calcRetiro.addEventListener('input', recalcular);
    recalcular();
  }, 50);
}

function editarCelda(element, celdaRef, titulo) {
  const nota    = element.getAttribute('data-note') || '';
  const formula = element.getAttribute('data-formula') || '';

  let addends = []; 
  
  if (formula && formula.includes('+')) {
    // CASO A: Hay una operación en la celda (Prioridad absoluta)
    const amounts = formula.replace('=', '').split('+').map(s => parseFloat(s.trim()));
    const rawNotes = nota ? nota.trim().split(/\n|\. (?=[0-9])/) : [];
    
    addends = amounts.map((v, i) => {
      let d = (rawNotes[i] || '').trim().replace(/\.$/, '');
      if (d.includes(':')) {
        d = d.split(':')[0].trim();
      } else {
        // Quitar el número redundante de la descripción si existe
        const allNums = d.match(/\d+(?:[.,]\d+)?/g);
        if (allNums) {
          let bestN = null;
          allNums.forEach(n => { if (Math.abs(parseFloat(n.replace(',','.')) - v) < 0.01) bestN = n; });
          if (bestN) d = d.replace(bestN, '').trim().replace(/^,\s*|,\s*$/g, '').replace(/S\/|\$|[A-Z]{3}/gi, '').trim();
        }
      }
      return { valor: v, desc: d || 'Sin descripción' };
    });
  } else if (nota && nota.trim()) {
    // CASO B: No hay fórmula compleja, parseamos desde la nota (Legacy/Fallback)
    const rawItems = nota.trim().split(/\n|\. (?=[0-9])/);
    rawItems.forEach(function(item) {
      item = item.trim().replace(/\.$/, '');
      if (!item) return;

      let val = NaN;
      let desc = '';
      
      if (item.includes(':')) {
        const parts = item.split(':');
        const left = parts[0].trim();
        const right = parts.slice(1).join(':').trim();
        const numRight = parseFloat(right.replace(/,/g, '.').replace(/[^\d.-]/g, ''));
        const numLeft = parseFloat(left.replace(/,/g, '.').replace(/[^\d.-]/g, ''));
        const pureAmountRegex = /^(?:S\/|\$|[A-Z]{2,3})?\s*[\d]+(?:[.,][\d]+)?\s*(?:[A-Z]{2,3})?$/i;

        if (!isNaN(numRight) && pureAmountRegex.test(right)) {
          val = numRight; desc = left;
        } else if (!isNaN(numLeft) && pureAmountRegex.test(left)) {
          val = numLeft; desc = right;
        } else {
          val = !isNaN(numRight) ? numRight : numLeft;
          desc = val === numRight ? left : (val === numLeft ? right : item);
        }
      } else {
        const currencyMatch = item.match(/(?:S\/|\$|[A-Z]{2,3})\s*([\d]+(?:[.,][\d]+)?)/i);
        if (currencyMatch) {
          val = parseFloat(currencyMatch[1].replace(',', '.'));
          desc = item.replace(currencyMatch[0], '').trim().replace(/^,\s*|,\s*$/g, '');
        } else {
          const allNums = item.match(/\d+(?:[.,]\d+)?/g);
          if (allNums && allNums.length > 0) {
            let bestMatch = allNums[allNums.length - 1];
            for (let n of allNums) { if (n.includes('.') || n.includes(',') || parseFloat(n) > 50) { bestMatch = n; break; } }
            val = parseFloat(bestMatch.replace(',', '.'));
            desc = item.replace(bestMatch, '').trim().replace(/^,\s*|,\s*$/g, '');
          }
        }
      }
      if (!isNaN(val)) addends.push({ valor: val, desc: desc || 'Sin descripción' });
    });
  }

  // Si aún no hay addends, usar valor de la celda
  if (addends.length === 0) {
    const valorActual = element.textContent.trim();
    const numActual = parseFloat(String(valorActual).replace(/[S\/$,\s]/g, '').replace(',', '.')) || 0;
    addends = [{ valor: numActual, desc: 'Total' }];
  }

  // Calcular total inicial
  const totalInicial = addends.reduce((s, a) => s + a.valor, 0);

  // Crear overlay modal
  const overlay = document.createElement('div');
  overlay.id = 'editB6Modal';
  overlay.style.cssText = `
    position:fixed;top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,0.82);display:flex;align-items:center;
    justify-content:center;z-index:9999;padding:20px;
    backdrop-filter:blur(14px);animation:fadeIn 0.2s ease;
  `;

  // Generar filas de inputs por sumando como tabla (Imagen 2)
  const inputsHtml = addends.map((a, i) => `
    <div style="display:flex; border-bottom:1px solid rgba(255,255,255,0.06); align-items:center;">
      <div style="flex:0 0 100px; padding:12px; border-right:1px solid rgba(255,255,255,0.06);">
        <input type="number" step="0.01" value="${a.valor.toFixed(2)}"
               id="editAddendVal_${i}" style="width:100%; background:transparent; border:none; color:var(--text); font-family:var(--font-mono); font-size:1.05rem; outline:none;" />
      </div>
      <div style="flex:1; padding:12px; display:flex; align-items:center;">
        <input type="text" value="${sanitize(a.desc)}" id="editAddendDesc_${i}"
               style="flex:1; background:transparent; border:none; color:var(--gray-light); font-family:var(--font-main); font-size:0.95rem; outline:none;" placeholder="Añade descripción..." />
      </div>
    </div>
  `).join('');

  overlay.innerHTML = `
    <div class="edit-modal-content">
      <div class="edit-modal-header">
        <div class="edit-modal-icon">S/</div>
        <div>
          <div class="edit-modal-title">Editar ${titulo || 'Monto'}</div>
        </div>
        <button class="edit-modal-close" onclick="document.getElementById('editB6Modal').remove()">&times;</button>
      </div>
      <div class="edit-modal-body" style="padding:20px;">
        <div style="border:1px solid rgba(255,255,255,0.1); border-radius:8px; overflow:hidden; margin-bottom:20px; background:rgba(0,0,0,0.2);">
          ${inputsHtml}
        </div>
        
        <div class="edit-formula-total" style="padding:15px; border-top:1px dashed rgba(255, 209, 102, 0.4); margin:0; border-bottom:1px dashed rgba(255, 209, 102, 0.4); background:rgba(255,209,102,0.05);">
          <span class="edit-formula-total-label">TOTAL CALCULADO:</span>
          <span class="edit-formula-total-value" id="editTotalCalc">
            S/ ${totalInicial.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
          </span>
        </div>
      </div>
      <div class="edit-modal-actions" style="padding-top:0;">
        <button class="edit-btn-cancel" onclick="document.getElementById('editB6Modal').remove()">
          Cancelar
        </button>
        <button class="edit-btn-confirm" id="editB6Confirm">
          ✓ Guardar
        </button>
      </div>
    </div>
  `;

  document.body.appendChild(overlay);

  // Actualizar total en tiempo real
  const totalEl = document.getElementById('editTotalCalc');
  function actualizarTotal() {
    let sum = 0;
    for (let i = 0; i < addends.length; i++) {
      const inp = document.getElementById('editAddendVal_' + i);
      if (inp) sum += parseFloat(inp.value) || 0;
    }
    totalEl.textContent = 'S/ ' + sum.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    totalEl._sum = sum;
  }

  // Adjuntar listeners a todos los inputs
  for (let i = 0; i < addends.length; i++) {
    const inpVal = document.getElementById('editAddendVal_' + i);
    const inpDesc = document.getElementById('editAddendDesc_' + i);
    
    if (inpVal) {
      inpVal.addEventListener('input', actualizarTotal);
      inpVal.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') document.getElementById('editB6Confirm').click();
        if (e.key === 'Escape') overlay.remove();
      });
    }
    if (inpDesc) {
      inpDesc.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') document.getElementById('editB6Confirm').click();
        if (e.key === 'Escape') overlay.remove();
      });
    }
  }
  // Foco en el primer input
  const firstInput = document.getElementById('editAddendVal_0');
  if (firstInput) { firstInput.focus(); firstInput.select(); }

  document.getElementById('editB6Confirm').addEventListener('click', function() {
    let sum = 0;
    const parts = [];
    const notes = [];
    for (let i = 0; i < addends.length; i++) {
      const inpVal  = document.getElementById('editAddendVal_' + i);
      const inpDesc = document.getElementById('editAddendDesc_' + i);
      
      const v = parseFloat((inpVal ? inpVal.value : '0') || '0');
      const desc = inpDesc ? inpDesc.value.trim() : '';
      
      if (isNaN(v)) { showAlert('error', 'Valor inválido en sumando ' + (i+1)); return; }
      
      parts.push(v.toFixed(2));
      
      // Guardamos bajo el formato estandarizado "Descripción: S/ Valor" para relectura fácil futura
      if (desc) {
        notes.push(desc + ': S/ ' + v.toFixed(2));
      } else {
        notes.push(v.toFixed(2));
      }
      
      sum += v;
    }
    
    const formula = '=' + parts.join('+');
    const newNota = notes.join('. ');
    overlay.remove();

    if (!isGASAvailable()) { showAlert('error', 'No se pudo conectar'); return; }
    
    // Llamar actualizarCelda pasando la formula y la nota
    google.script.run
      .withSuccessHandler(function(response) {
        if (response && response.success) {
          element.textContent = 'S/ ' + sum.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
          // Update the tooltip data immediately
          element.setAttribute('data-note', newNota.replace(/\. (?=[0-9])/g, '\n').replace(/\.$/, ''));
          showAlert('success', 'Monto actualizado correctamente');
          setTimeout(function() { cargarResumen(true); }, 600);
        } else {
          showAlert('error', extraerMensaje(response, 'Error'));
        }
      })
      .withFailureHandler(function(error) {
        showAlert('error', 'Error: ' + extraerMensaje(error, 'Error desconocido'));
      })
      .actualizarCelda(celdaRef, formula, newNota);
  });

  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) overlay.remove();
  });
}

// UTILIDADES

/** Verifica si google.script.run está disponible */
function isGASAvailable() {
  return typeof google !== 'undefined' && google.script && typeof google.script.run !== 'undefined';
}

/** Extrae el mensaje de error de una respuesta o Error object */
function extraerMensaje(obj, fallback) {
  if (!obj) return fallback || 'Error desconocido';
  if (typeof obj === 'string') return obj;
  if (obj.message) return obj.message;
  if (obj.msg)     return obj.msg;
  if (obj.error)   return typeof obj.error === 'string' ? obj.error : JSON.stringify(obj.error);
  return fallback || 'Error desconocido';
}

/** Sanitiza texto para evitar XSS en innerHTML */
function sanitize(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/** Actualiza el badge contador de una sección */
function actualizarContador(id, count) {
  const el = document.getElementById(id);
  if (!el) return;
  if (id === 'countHistorial') {
    el.textContent = count + (count === 1 ? ' completada' : ' completadas');
  } else {
    el.textContent = count + (count === 1 ? ' activa' : count === 0 ? '0' : ' activas');
  }
}

function formatearFecha(fecha) {
  if (!fecha) return '-';
  try {
    const d = new Date(fecha.replace(/-/g, '/'));
    if (isNaN(d.getTime())) return '-';
    return d.toLocaleString('es-ES', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  } catch (e) { return '-'; }
}

function formatearNumero(num) {
  if (num === null || num === undefined || num === '' || isNaN(Number(num))) return '-';
  try {
    return parseFloat(num).toLocaleString('es-ES', {
      minimumFractionDigits: 2,
      maximumFractionDigits: 4
    });
  } catch (e) { return '-'; }
}

function formatearMonto(monto, moneda) {
  const mon = moneda || 'USDT';
  if (mon === 'USDT') {
    if (monto === null || monto === undefined || monto === '' || isNaN(Number(monto))) return '$-';
    return '$' + parseFloat(monto).toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  if (mon === 'ETH' || mon === 'BTC') {
    if (monto === null || monto === undefined || monto === '' || isNaN(Number(monto))) return '- ' + mon;
    return parseFloat(monto).toLocaleString('es-ES', { minimumFractionDigits: 6, maximumFractionDigits: 6 }) + ' ' + mon;
  }
  return formatearNumero(monto) + ' ' + mon;
}

function formatearFinal(valor, moneda) {
  const mon = moneda || 'USDT';
  if (valor === null || valor === undefined || valor === '' || isNaN(Number(valor))) return '-';
  if (mon === 'USDT') {
    return '$' + parseFloat(valor).toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  if (mon === 'ETH' || mon === 'BTC') {
    return parseFloat(valor).toLocaleString('es-ES', { minimumFractionDigits: 6, maximumFractionDigits: 6 }) + ' ' + mon;
  }
  return formatearNumero(valor);
}

function formatearInteres(valor, moneda) {
  const mon = moneda || 'USDT';
  if (valor === null || valor === undefined || valor === '' || isNaN(Number(valor))) return '-';
  // Interest always in USDT with 2 decimals
  return '$' + parseFloat(valor).toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function getBadgeClass(tipoOperacion) {
  if (!tipoOperacion) return '';
  if (tipoOperacion.includes('Sell ETH')) return 'badge-eth-sell';
  if (tipoOperacion.includes('Buy ETH'))  return 'badge-eth-buy';
  if (tipoOperacion.includes('Sell BTC')) return 'badge-btc-sell';
  if (tipoOperacion.includes('Buy BTC'))  return 'badge-btc-buy';
  return '';
}

function showAlert(type, message) {
  let alertId = 'alertError';
  let msgId   = 'alertErrorMsg';

  if (type === 'success') {
    alertId = 'alertSuccess';
    msgId   = 'alertSuccessMsg';
  } else if (type === 'info') {
    alertId = 'alertInfo';
    msgId   = 'alertInfoMsg';
  }

  const alertEl = document.getElementById(alertId);
  const msgEl   = document.getElementById(msgId);

  if (msgEl)   msgEl.textContent = message;
  if (alertEl) alertEl.classList.add('show');

  setTimeout(() => { if (alertEl) alertEl.classList.remove('show'); }, 6000);
}

function showLoading(elementId, show) {
  const element = document.getElementById(elementId);
  if (element) {
    element.classList.toggle('show', show);
  }
}

function mostrarConfirmacion(mensaje, onConfirm, onCancel) {
  const overlay = document.createElement('div');
  overlay.id = 'confirmModal';
  overlay.style.cssText = `
    position:fixed;top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,0.85);display:flex;align-items:center;
    justify-content:center;z-index:9999;padding:20px;
    backdrop-filter:blur(16px);animation:fadeIn 0.2s ease;
  `;

  overlay.innerHTML = `
    <div class="edit-modal-content" style="max-width:380px; text-align:center; box-shadow: 0 24px 60px rgba(0,0,0,0.8), 0 0 30px rgba(0, 212, 255, 0.15);">
      <div class="edit-modal-header" style="justify-content:center; border-bottom:none; flex-direction:column; gap:16px; padding-bottom:10px;">
        <div class="edit-modal-icon" style="background:rgba(0, 212, 255, 0.1); color:var(--primary); font-size:1.6rem; width:56px; height:56px;">?</div>
        <div class="edit-modal-title" style="font-size:1.15rem; line-height:1.4;">${sanitize(mensaje)}</div>
      </div>
      <div class="edit-modal-actions" style="justify-content:center; gap:15px; border-top:none; padding-top:10px;">
        <button class="edit-btn-cancel" id="confirmModalCancel">Cancelar</button>
        <button class="edit-btn-confirm" id="confirmModalAccept" style="min-width:120px;">Aceptar</button>
      </div>
    </div>
  `;

  document.body.appendChild(overlay);

  document.getElementById('confirmModalAccept').addEventListener('click', function() {
    overlay.remove();
    if (onConfirm) onConfirm();
  });

  document.getElementById('confirmModalCancel').addEventListener('click', function() {
    overlay.remove();
    if (onCancel) onCancel();
  });

  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) {
      overlay.remove();
      if (onCancel) onCancel();
    }
  });
}
</script>
