<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --primary: #00d4ff;
    --primary-dark: #0099cc;
    --primary-glow: rgba(0, 212, 255, 0.25);
    --secondary: #00ff94;
    --secondary-dark: #00cc75;
    --secondary-glow: rgba(0, 255, 148, 0.2);
    --accent: #f7931a;
    --accent-eth: #627eea;
    --danger: #ff4d6d;
    --danger-glow: rgba(255, 77, 109, 0.2);
    --warning: #ffd166;
    --dark: #0a0e1a;
    --dark-2: #0d1224;
    --dark-3: #111827;
    --card-bg: rgba(13, 18, 36, 0.85);
    --card-border: rgba(0, 212, 255, 0.12);
    --card-border-hover: rgba(0, 212, 255, 0.35);
    --gray: #8892a4;
    --gray-light: #e2e8f0;
    --border: rgba(255, 255, 255, 0.07);
    --text: #f8fafc;
    --text-muted: #94a3b8;
    --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
    --shadow-lg: 0 12px 48px rgba(0, 0, 0, 0.5);
    --shadow-glow: 0 0 40px rgba(0, 212, 255, 0.08);
    --font-main: 'Inter', system-ui, -apple-system, sans-serif;
    --font-mono: 'Inter', system-ui, -apple-system, sans-serif;
    --font-head: 'Inter', system-ui, -apple-system, sans-serif;
  }

  body {
    font-family: var(--font-main);
    background: var(--dark);
    background-image:
      radial-gradient(ellipse 80% 60% at 50% -20%, rgba(0, 212, 255, 0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(99, 102, 241, 0.05) 0%, transparent 50%),
      radial-gradient(ellipse 40% 30% at 10% 70%, rgba(0, 255, 148, 0.04) 0%, transparent 50%);
    min-height: 100vh;
    color: var(--text);
    padding-bottom: 60px;
    font-size: 15px;
    line-height: 1.6;
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 20px;
  }

  /* ==============================
     HEADER
  ============================== */
  .header {
    text-align: center;
    padding: 50px 20px 40px;
    position: relative;
  }

  .header::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--primary), transparent);
    opacity: 0.4;
  }

  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(0, 212, 255, 0.08);
    border: 1px solid rgba(0, 212, 255, 0.2);
    border-radius: 50px;
    padding: 6px 18px;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--primary);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 20px;
    font-family: var(--font-mono);
  }

  .header-badge .dot {
    width: 7px;
    height: 7px;
    background: var(--secondary);
    border-radius: 50%;
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--secondary); }
    50% { opacity: 0.5; box-shadow: 0 0 12px var(--secondary); }
  }

  .header h1 {
    font-family: var(--font-head);
    font-size: 2.8rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #ffffff 0%, var(--primary) 60%, var(--secondary) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
    line-height: 1.15;
  }

  .header p {
    color: var(--gray);
    font-size: 1rem;
    font-weight: 400;
    letter-spacing: 0.3px;
  }

  /* ==============================
     CARDS
  ============================== */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 20px;
    box-shadow: var(--shadow), var(--shadow-glow);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s ease, box-shadow 0.3s ease;
    will-change: transform, box-shadow;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.3), transparent);
  }

  .card:hover {
    border-color: var(--card-border-hover);
    box-shadow: var(--shadow-lg), 0 0 50px rgba(0, 212, 255, 0.1);
  }

  .card-title {
    font-family: var(--font-head);
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    letter-spacing: -0.2px;
  }

  .card-title .icon {
    width: 38px;
    height: 38px;
    background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(0, 153, 204, 0.1));
    border: 1px solid rgba(0, 212, 255, 0.3);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--primary);
    font-size: 1.1rem;
    box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
  }

  /* ==============================
     FORM
  ============================== */
  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 18px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
  }

  .form-group label {
    font-weight: 500;
    margin-bottom: 8px;
    color: var(--gray-light);
    font-size: 0.82rem;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-family: var(--font-mono);
  }

  .form-group input,
  .form-group select {
    padding: 12px 16px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    font-size: 0.95rem;
    font-family: var(--font-main);
    transition: all 0.3s;
    background: rgba(255, 255, 255, 0.04);
    color: var(--text);
    width: 100%;
    outline: none;
  }

  .form-group input::placeholder {
    color: var(--text-muted);
  }

  .form-group select option {
    background: var(--dark-3);
    color: var(--text);
  }

  .form-group input:focus,
  .form-group select:focus {
    border-color: rgba(0, 212, 255, 0.5);
    background: rgba(0, 212, 255, 0.04);
    box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.08), 0 0 20px rgba(0, 212, 255, 0.06);
  }

  input[type="datetime-local"]::-webkit-calendar-picker-indicator {
    cursor: pointer;
    filter: invert(0.7) sepia(1) hue-rotate(175deg) brightness(1.2);
  }

  /* ==============================
     BUTTONS
  ============================== */
  .btn {
    padding: 13px 28px;
    border: none;
    border-radius: 12px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-family: var(--font-main);
    letter-spacing: 0.3px;
    position: relative;
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    transition: left 0.5s ease;
  }

  .btn:hover::after {
    left: 100%;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: var(--dark);
    box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
    font-weight: 700;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0, 212, 255, 0.45);
  }

  .btn-primary:active {
    transform: translateY(0);
  }

  .btn-success {
    background: linear-gradient(135deg, var(--secondary), var(--secondary-dark));
    color: var(--dark);
    box-shadow: 0 4px 20px rgba(0, 255, 148, 0.25);
    font-weight: 700;
  }

  .btn-success:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0, 255, 148, 0.4);
  }

  /* ==============================
     TABLES
  ============================== */
  .table-container {
    overflow-x: auto;
    border-radius: 14px;
    border: 1px solid var(--card-border);
    margin-top: 16px;
  }

  .historial-table-container {
    max-height: 480px;
    overflow-y: auto;
  }
  
  /* Scrollbar personalizado para esta tabla minimizada */
  .historial-table-container::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }
  .historial-table-container::-webkit-scrollbar-track {
    background: rgba(0,0,0,0.2);
    border-radius: 6px;
  }
  .historial-table-container::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.1);
    border-radius: 6px;
  }
  .historial-table-container::-webkit-scrollbar-thumb:hover {
    background: rgba(255,255,255,0.2);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.87rem;
  }

  th {
    background: rgba(0, 212, 255, 0.06);
    color: var(--primary);
    padding: 13px 12px;
    text-align: left;
    font-weight: 600;
    white-space: nowrap;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-family: var(--font-mono);
    border-bottom: 1px solid rgba(0, 212, 255, 0.12);
  }

  td {
    padding: 13px 12px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.85rem;
  }

  tr:last-child td {
    border-bottom: none;
  }

  tr:hover td {
    background: rgba(0, 212, 255, 0.03);
  }

  tr.operacion-row {
    cursor: pointer;
    transition: all 0.2s;
  }

  tr.operacion-row:hover td {
    background: rgba(0, 212, 255, 0.05);
  }

  /* ==============================
     BADGES
  ============================== */
  .badge {
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    display: inline-block;
    letter-spacing: 0.5px;
    font-family: var(--font-mono);
  }

  .badge-eth-sell {
    background: rgba(247, 147, 26, 0.15);
    color: var(--accent);
    border: 1px solid rgba(247, 147, 26, 0.3);
  }

  .badge-eth-buy {
    background: rgba(0, 255, 148, 0.1);
    color: var(--secondary);
    border: 1px solid rgba(0, 255, 148, 0.25);
  }

  .badge-btc-sell {
    background: rgba(255, 77, 109, 0.12);
    color: var(--danger);
    border: 1px solid rgba(255, 77, 109, 0.25);
  }

  .badge-btc-buy {
    background: rgba(0, 212, 255, 0.1);
    color: var(--primary);
    border: 1px solid rgba(0, 212, 255, 0.25);
  }

  .badge-usdt {
    background: rgba(0, 255, 148, 0.12);
    color: var(--secondary);
    border: 1px solid rgba(0, 255, 148, 0.25);
  }

  .badge-eth {
    background: rgba(98, 126, 234, 0.15);
    color: var(--accent-eth);
    border: 1px solid rgba(98, 126, 234, 0.3);
  }

  .badge-btc {
    background: rgba(247, 147, 26, 0.12);
    color: var(--accent);
    border: 1px solid rgba(247, 147, 26, 0.3);
  }

  .badge-duration {
    background: rgba(255, 255, 255, 0.05);
    color: var(--text-muted);
    font-size: 0.7rem;
    padding: 2px 6px;
    border-radius: 4px;
    margin-top: 5px;
    display: inline-block;
    border: 1px solid rgba(255, 255, 255, 0.08);
    font-family: var(--font-main);
    letter-spacing: 0.3px;
    text-transform: none;
  }

  .btn-icon {
    background: rgba(13, 18, 36, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.12);
    color: #4ade80; /* Green pencil color */
    border-radius: 10px;
    width: 38px;
    height: 38px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    padding: 0;
  }

  .form-actions {
    margin-top: 30px;
    display: flex;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .btn-outline {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.12);
    color: var(--gray);
    box-shadow: none;
  }

  .btn-outline:hover {
    background: rgba(255, 77, 109, 0.08);
    border-color: rgba(255, 77, 109, 0.25);
    color: var(--danger);
    transform: translateY(-1px);
  }

  .btn-icon:hover {
    background: rgba(74, 222, 128, 0.1);
    border-color: #4ade80;
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(74, 222, 128, 0.2);
  }

  .btn-icon-danger {
    color: #f87171; /* Red trash color */
  }

  .btn-icon-danger:hover {
    background: rgba(248, 113, 113, 0.1);
    border-color: #f87171;
    color: #f87171;
    box-shadow: 0 4px 15px rgba(248, 113, 113, 0.2);
  }

  .btn-icon svg {
    width: 20px;
    height: 20px;
  }

  /* ==============================
     SELECT COMPLETAR
  ============================== */
  .select-moneda-final {
    padding: 6px 10px;
    border: 1px solid rgba(0, 212, 255, 0.2);
    border-radius: 8px;
    font-size: 0.8rem;
    cursor: pointer;
    background: rgba(0, 212, 255, 0.05);
    color: var(--text);
    min-width: 90px;
    font-family: var(--font-mono);
    outline: none;
    transition: all 0.2s;
  }

  .select-moneda-final:focus {
    border-color: rgba(0, 212, 255, 0.5);
    box-shadow: 0 0 0 2px rgba(0, 212, 255, 0.1);
  }

  .select-moneda-final option {
    background: var(--dark-3);
  }

  /* ==============================
     MODAL
  ============================== */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.75);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  .modal-overlay.active {
    display: flex;
  }

  .modal {
    background: var(--dark-2);
    border: 1px solid var(--card-border-hover);
    border-radius: 22px;
    max-width: 620px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    animation: modalSlide 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6), 0 0 60px rgba(0, 212, 255, 0.08);
  }

  @keyframes modalSlide {
    from { opacity: 0; transform: translateY(-24px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .modal-header {
    padding: 22px 26px;
    border-bottom: 1px solid var(--card-border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(135deg, rgba(0, 212, 255, 0.08), rgba(0, 153, 204, 0.04));
    border-radius: 22px 22px 0 0;
  }

  .modal-title {
    font-family: var(--font-head);
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: -0.2px;
  }

  .modal-close {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    color: var(--gray);
    font-size: 1.4rem;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }

  .modal-close:hover {
    background: rgba(255, 77, 109, 0.15);
    border-color: rgba(255, 77, 109, 0.3);
    color: var(--danger);
  }

  .modal-body {
    padding: 26px;
  }

  .detail-grid {
    display: flex;
    flex-direction: column;
    gap: 0;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 12px;
    overflow: hidden;
  }

  .detail-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    background: transparent;
    border-radius: 0;
    transition: background 0.2s;
  }

  .detail-item:last-child {
    border-bottom: none;
  }

  .detail-item:hover {
    background: rgba(0, 212, 255, 0.03);
  }

  .detail-label {
    font-size: 0.76rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 0;
    font-family: var(--font-mono);
    width: 45%;
  }

  .detail-value {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
    font-family: var(--font-mono);
    text-align: right;
    display: flex;
    justify-content: flex-end;
  }

  .detail-value.highlight { color: var(--primary); }
  .detail-value.success   { color: var(--secondary); }

  /* ==============================
     RESUMEN
  ============================== */
  .resumen-section {
    margin-top: 20px;
  }

  .resumen-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 18px;
  }

  .resumen-card {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 22px;
    transition: all 0.3s;
  }

  .resumen-card:hover {
    border-color: var(--card-border-hover);
    background: rgba(0, 212, 255, 0.02);
  }

  .resumen-card h3 {
    font-family: var(--font-head);
    font-size: 0.8rem;
    color: var(--primary);
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .resumen-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 11px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.04);
  }

  .resumen-item:last-child { border-bottom: none; }

  .resumen-label {
    color: var(--gray);
    font-size: 0.85rem;
    font-family: var(--font-main);
  }

  .resumen-value {
    font-weight: 600;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.9rem;
  }

  .resumen-value.editable {
    background: rgba(255, 209, 102, 0.1);
    border: 1px solid rgba(255, 209, 102, 0.25);
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    position: relative;
    color: var(--warning);
    transition: all 0.2s;
  }

  .resumen-value.editable:hover {
    background: rgba(255, 209, 102, 0.18);
    box-shadow: 0 0 12px rgba(255, 209, 102, 0.15);
  }

  .resumen-value.highlight {
    color: var(--primary);
    font-size: 1rem;
  }

  .resumen-value.success {
    color: var(--secondary);
    font-size: 1rem;
  }

  /* ==============================
     ALERTAS
  ============================== */
  .alert {
    padding: 14px 20px;
    border-radius: 12px;
    margin-bottom: 18px;
    display: none;
    align-items: center;
    gap: 12px;
    backdrop-filter: blur(10px);
  }

  .alert.show { display: flex; }

  .alert-success {
    background: rgba(0, 255, 148, 0.08);
    color: var(--secondary);
    border: 1px solid rgba(0, 255, 148, 0.2);
  }

  .alert-error {
    background: rgba(255, 77, 109, 0.08);
    color: var(--danger);
    border: 1px solid rgba(255, 77, 109, 0.2);
  }

  .alert-info {
    background: rgba(0, 212, 255, 0.08);
    color: var(--primary);
    border: 1px solid rgba(0, 212, 255, 0.2);
  }

  /* ==============================
     LOADING
  ============================== */
  .loading {
    display: none;
    text-align: center;
    padding: 50px 40px;
  }

  .loading.show { display: block; }

  .spinner {
    width: 42px;
    height: 42px;
    border: 3px solid rgba(0, 212, 255, 0.1);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
    box-shadow: 0 0 20px rgba(0, 212, 255, 0.15);
  }

  .loading p {
    color: var(--gray);
    font-size: 0.9rem;
    font-family: var(--font-mono);
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ==============================
     EMPTY STATE
  ============================== */
  .empty-state {
    text-align: center;
    padding: 50px 20px;
    color: var(--gray);
  }

  .empty-state-icon {
    font-size: 3rem;
    margin-bottom: 16px;
    opacity: 0.4;
    display: block;
  }

  .empty-state h3 {
    font-family: var(--font-head);
    color: var(--gray-light);
    font-size: 1.1rem;
    margin-bottom: 8px;
  }

  .empty-state p {
    font-size: 0.9rem;
    opacity: 0.75;
    margin-bottom: 0;
  }
